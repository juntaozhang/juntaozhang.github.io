apiVersion: apps/v1
kind: Deployment
metadata:
  name: iceberg-rest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iceberg-rest
  template:
    metadata:
      labels:
        app: iceberg-rest
    spec:
      containers:
        - name: iceberg-rest
          image: tabulario/iceberg-rest:latest
          ports:
            - containerPort: 8181
          env:
            - name: AWS_ACCESS_KEY_ID
              value: "minio"
            - name: AWS_SECRET_ACCESS_KEY
              value: "minio12345"
            - name: AWS_REGION
              value: "us-east-1"
            - name: CATALOG_WAREHOUSE
              value: "s3://warehouse/"
            - name: CATALOG_IO__IMPL
              value: "org.apache.iceberg.aws.s3.S3FileIO"
            - name: CATALOG_S3_ENDPOINT
              value: "http://minio-svc:9000"
            - name: CATALOG
              value: "rest"
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8181
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: iceberg-rest
spec:
  selector:
    app: iceberg-rest
  ports:
    - port: 8181
      targetPort: 8181
  type: LoadBalancer